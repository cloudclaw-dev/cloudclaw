# Cluster mode configuration (PostgreSQL + Redis + external MQ)
# Usage: --spring.profiles.active=cluster

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/cloudclaw}
    username: ${DATABASE_USER:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

cloudclaw:
  mode: cluster
  mq:
    provider: ${MQ_PROVIDER:redis}
  cache:
    session-ttl: 30m
    agent-ttl: 1h
    memory-ttl: 10m
  sandbox:
    default-backend: DOCKER
    default-mode: STATELESS
    default-timeout: 30s
    max-timeout: 5m
    max-concurrent: 20
    allowed-languages: python,javascript,java
    docker:
      enabled: true
      images:
        python: python:3.11-slim
        javascript: node:20-slim
        shell: alpine:latest
        java: eclipse-temurin:17-jdk-alpine
      memory: 512m
      cpus: 1
      network-enabled: false
    e2b:
      enabled: false
      api-key: ${E2B_API_KEY:}
      template-id: ${E2B_TEMPLATE_ID:}

logging:
  level:
    run.cloudclaw: INFO
    io.modelcontextprotocol: WARN
    org.springframework.ai: WARN
    org.hibernate.SQL: WARN
