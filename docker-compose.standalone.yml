# CloudClaw - Standalone Mode (SQLite, zero dependencies)
# Usage: docker compose -f docker-compose.standalone.yml up -d
#
# Best for: personal use, small teams, testing

version: '3.8'
services:
  cloudclaw:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    environment:
      CLOUDCLAW_JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      CLOUDCLAW_LLM_ENCRYPTION_KEY: ${LLM_ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef}
    volumes:
      - cloudclaw-data:/app/data

volumes:
  cloudclaw-data:
