  <rect x="40" y="480" width="290" height="110" fill="none" stroke="#db2777" stroke-width="1.5" stroke-dasharray="8 5" rx="16"/>
  <text x="60" y="503" font-size="14" font-weight="700" fill="#db2777">🛠️ 企业开发者</text>
  <text x="60" y="519" font-size="11" fill="#5b6475">配置和编排数字员工</text>

  <rect x="70" y="533" width="110" height="40" fill="#fecaca" stroke="#94a3b8" stroke-width="1" rx="8"/>
