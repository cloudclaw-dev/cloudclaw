  <text x="500" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#172033">CloudClaw — 企业级 AI Agent 平台架构</text>
  <text x="500" y="54" text-anchor="middle" font-size="12" fill="#5b6475">企业开发者构建数字员工，服务全体员工</text>

  <!-- ===== Zone 1: 企业员工 (top) ===== -->
  <rect x="40" y="70" width="920" height="105" fill="none" stroke="#059669" stroke-width="1.5" stroke-dasharray="8 5" rx="16"/>
  <text x="60" y="93" font-size="14" font-weight="700" fill="#059669">👥 企业员工（全员使用）</text>
  <text x="60" y="109" font-size="11" fill="#5b6475">通过 Web / 移动端与数字员工交互</text>

  <rect x="130" y="118" width="76" height="40" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1" rx="20"/>
  <text x="168" y="143" text-anchor="middle" font-size="11" fill="#172033">👤 员工A</text>

  <rect x="250" y="118" width="76" height="40" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1" rx="20"/>
  <text x="288" y="143" text-anchor="middle" font-size="11" fill="#172033">👤 员工B</text>

  <rect x="370" y="118" width="76" height="40" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1" rx="20"/>
  <text x="408" y="143" text-anchor="middle" font-size="11" fill="#172033">👤 员工C</text>

  <text x="478" y="143" font-size="12" fill="#5b6475">…</text>

  <rect x="520" y="118" width="76" height="40" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1" rx="20"/>
  <text x="558" y="143" text-anchor="middle" font-size="11" fill="#172033">👤 员工N</text>

  <!-- Arrows: employees -> CloudClaw -->
  <line x1="168" y1="158" x2="380" y2="210" stroke="#64748b" stroke-width="1.5" fill="none" marker-end="url(#arr-green)"/>
  <line x1="288" y1="158" x2="430" y2="210" stroke="#64748b" stroke-width="1.5" fill="none" marker-end="url(#arr-green)"/>
  <line x1="408" y1="158" x2="500" y2="210" stroke="#64748b" stroke-width="1.5" fill="none" marker-end="url(#arr-green)"/>
  <line x1="558" y1="158" x2="570" y2="210" stroke="#64748b" stroke-width="1.5" fill="none" marker-end="url(#arr-green)"/>

