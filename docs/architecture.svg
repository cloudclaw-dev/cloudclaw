  <rect x="200" y="533" width="110" height="40" fill="#fecaca" stroke="#94a3b8" stroke-width="1" rx="8"/>
  <text x="255" y="558" text-anchor="middle" font-size="11" fill="#172033">🔄 编排工作流</text>

