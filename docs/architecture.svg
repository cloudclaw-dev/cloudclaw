<svg viewBox="0 0 1000 680" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#64748b"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#059669"/>
    </marker>
    <marker id="arr-pink" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#db2777"/>
    </marker>
    <style>
      text { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1000" height="680" fill="#f8fafc" rx="12"/>

