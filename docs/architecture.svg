  <text x="285" y="362" text-anchor="middle" font-size="10" fill="#5b6475">数字员工</text>

  <rect x="370" y="325" width="130" height="48" fill="#bfdbfe" stroke="#94a3b8" stroke-width="1" rx="8"/>
  <text x="435" y="346" text-anchor="middle" font-size="12" font-weight="600" fill="#172033">📊 数据分析 Agent</text>
  <text x="435" y="362" text-anchor="middle" font-size="10" fill="#5b6475">数字员工</text>

  <rect x="520" y="325" width="130" height="48" fill="#bfdbfe" stroke="#94a3b8" stroke-width="1" rx="8"/>
  <text x="585" y="346" text-anchor="middle" font-size="12" font-weight="600" fill="#172033">📝 文档 Agent</text>
  <text x="585" y="362" text-anchor="middle" font-size="10" fill="#5b6475">数字员工</text>

  <rect x="670" y="325" width="80" height="48" fill="#fde68a" stroke="#94a3b8" stroke-width="1" rx="8"/>
  <text x="710" y="352" text-anchor="middle" font-size="12" fill="#172033">…</text>

