  <rect x="370" y="480" width="250" height="110" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="8 5" rx="16"/>
  <text x="390" y="503" font-size="14" font-weight="700" fill="#172033">🗄️ 基础设施</text>
  <text x="390" y="519" font-size="11" fill="#5b6475">可插拔后端</text>

  <rect x="390" y="533" width="100" height="40" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1" rx="8"/>
  <text x="440" y="558" text-anchor="middle" font-size="11" fill="#172033">🐘 PostgreSQL</text>

  <rect x="510" y="533" width="80" height="40" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1" rx="8"/>
  <text x="550" y="558" text-anchor="middle" font-size="11" fill="#172033">⚡ Redis</text>

  <!-- Arrow: infra -> platform -->
  <line x1="490" y1="480" x2="470" y2="450" stroke="#64748b" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- ===== Zone 5: OpenClaw (bottom-right) ===== -->
  <rect x="660" y="480" width="300" height="110" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="8 5" rx="16" opacity="0.5"/>
  <text x="680" y="503" font-size="14" font-weight="700" fill="#172033" opacity="0.6">🐾 OpenClaw（对比）</text>
  <text x="680" y="519" font-size="11" fill="#5b6475" opacity="0.5">个人 AI 助手，面向个人开发者</text>

  <rect x="680" y="533" width="100" height="40" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1" rx="8" opacity="0.5"/>
  <text x="730" y="558" text-anchor="middle" font-size="11" fill="#172033" opacity="0.6">👤 个人用户</text>

  <rect x="800" y="533" width="100" height="40" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1" rx="8" opacity="0.5"/>
  <text x="850" y="558" text-anchor="middle" font-size="11" fill="#172033" opacity="0.6">📝 本地记忆</text>

  <!-- Bottom annotation -->
  <text x="500" y="640" text-anchor="middle" font-size="11" fill="#5b6475">
    OpenClaw = 个人管家（1人1Agent，本地运行）  ·  CloudClaw = 企业Agent平台（多租户，N个数字员工，服务全员）
  </text>
