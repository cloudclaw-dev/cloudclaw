  <text x="285" y="413" text-anchor="middle" font-size="11" fill="#172033">🔌 MCP 网关</text>

  <rect x="370" y="390" width="130" height="36" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1" rx="6"/>
  <text x="435" y="413" text-anchor="middle" font-size="11" fill="#172033">🛠️ 技能系统</text>

  <rect x="520" y="390" width="130" height="36" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1" rx="6"/>
  <text x="585" y="413" text-anchor="middle" font-size="11" fill="#172033">📦 代码沙箱</text>

  <rect x="670" y="390" width="80" height="36" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1" rx="6"/>
  <text x="710" y="413" text-anchor="middle" font-size="11" fill="#172033">🌐 LLM</text>

